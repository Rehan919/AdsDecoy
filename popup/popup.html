<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Decoy</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <p class="popup__eyebrow">Digital Decoy</p>
        <h1>Privacy shield</h1>
        <p class="popup__subtitle">Tracker visibility with persona-based browsing noise controls.</p>
      </header>

      <section class="panel">
        <div class="panel__row">
          <span class="label">Detection Engine</span>
          <span class="badge badge--on">Active</span>
        </div>
        <div class="panel__row">
          <span class="label">Detected Trackers</span>
          <span id="tracker-count" class="value">0</span>
        </div>
      </section>

      <section class="panel">
        <p class="list-title">Companies</p>
        <ul id="tracker-list" class="tracker-list">
          <li class="tracker-list__empty">No trackers detected yet.</li>
        </ul>
      </section>

      <section class="panel">
        <div class="panel__row">
          <span class="label">Deception Mode</span>
          <span id="deception-status" class="badge badge--off">Off</span>
        </div>
        <div class="panel__row">
          <span class="label">Persona</span>
          <span id="persona-name" class="value">gardener</span>
        </div>
        <div class="panel__row">
          <span class="label">Session Status</span>
          <span id="session-status" class="value value--soft">Idle</span>
        </div>
        <div class="panel__detail">
          <span id="schedule-text">Next run is scheduled after deception mode is enabled.</span>
        </div>
      </section>

      <section class="panel">
        <label class="control-group" for="persona-select">
          <span class="label">Choose Persona</span>
          <select id="persona-select" class="select">
            <option value="gardener">Gardener</option>
            <option value="executive">Executive</option>
            <option value="student">Student</option>
          </select>
        </label>
        <button id="toggle-deception" class="button" type="button">Enable Deception</button>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
